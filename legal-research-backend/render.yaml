services:
  - type: web
    name: owl-legal-research-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: ALLOWED_ORIGINS
        value: "https://owl-ai-agency.com,https://hobie1kenobi.github.io,http://localhost:8000,http://127.0.0.1:5500"
